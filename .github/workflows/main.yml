name: Run Bot 24/7

on:
  push:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Requirements
        run: |
          pip install pyTelegramBotAPI

      - name: Run Your Commands
        run: |
          cd Dipak
          ls
          pip install telebot
          chmod +x *
          ls
          python m.py
