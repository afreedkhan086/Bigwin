name: Smart Restart Bot

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Smart Control
        run: |
          echo "Checking bot state..."

          # Agar lock file exist karta hai → bot already running (skip)
          if [ -f "running.lock" ]; then
            echo "Bot already running, skipping..."
            exit 0
          fi

          echo "Bot not running, starting..."

          # Lock create karo
          touch running.lock

          unzip -n Dipak.zip
          cd Dipak
          pip install telebot
          chmod +x *

          # Run bot
          python m.py

          # Jab bot band ho jaye → lock remove
          cd ..
          rm -f running.lock
