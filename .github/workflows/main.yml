name: Run Bot 24/7

on:
  push:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run Commands
        run: |
          ls
          unzip -o Dipak.zip
          ls
          cd Dipak
          ls
          pip install telebot
          chmod +x *
          ls
          python m.py
